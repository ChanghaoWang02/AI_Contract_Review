version: "3.8"

services:
  backend:
    build: ./backend
    container_name: atcr-backend
    ports:
      - "8000:8000"
    environment:
      - DEBUG=true
      - DB_SERVER=sqlserver
      - DB_PORT=1433
      - DB_NAME=ATCR
      - DB_USER=sa
      - DB_PASSWORD=${DB_PASSWORD:?err}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
    depends_on:
      sqlserver:
        condition: service_healthy
    volumes:
      - ./backend:/app
    restart: unless-stopped

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: atcr-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${DB_PASSWORD:?err}
      - MSSQL_DBNAME=ATCR
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "${DB_PASSWORD:?err}" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: atcr-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  sqldata:
